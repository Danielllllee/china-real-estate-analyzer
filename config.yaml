# 估值模型参数
valuation:
  # 无风险利率（10年期国债收益率）
  risk_free_rate: 0.025
  # 房产风险溢价
  property_risk_premium: 0.025
  # 合理租金收益率区间
  reasonable_yield_range: [0.04, 0.06]
  # DCF参数
  dcf:
    projection_years: 30
    rent_growth_rate: 0.02
    terminal_cap_rate: 0.05
  # 成本法参数
  cost:
    construction_cost_per_sqm: [2500, 4000]  # 元/平米
    developer_margin: 0.12

# 交易成本参数
transaction:
  deed_tax_first: 0.01      # 首套≤90㎡
  deed_tax_first_large: 0.015  # 首套>90㎡
  deed_tax_second: 0.02     # 二套
  agency_fee: 0.015          # 中介费
  maintenance_fund: 0.02     # 维修基金（按房价比例估算）

# 持有成本参数
holding:
  property_fee_per_sqm_month: [2, 8]  # 物业费 元/㎡/月
  vacancy_rate: 0.05          # 空置率
  maintenance_annual: 0.005   # 年维护费（占房价比例）

# 贷款参数
mortgage:
  commercial_rate: 0.037     # 商贷利率
  provident_rate: 0.0275     # 公积金利率
  max_years: 30
  down_payment_first: 0.30   # 首套首付比例
  down_payment_second: 0.40  # 二套首付比例
